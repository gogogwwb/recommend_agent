version: 1
disable_existing_loggers: false

formatters:
  default:
    format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  json:
    (): pythonjsonlogger.jsonlogger.JsonFormatter
    format: '%(asctime)s %(name)s %(levelname)s %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'
  
  detailed:
    format: '%(asctime)s - %(name)s - %(levelname)s - [%(filename)s:%(lineno)d] - %(funcName)s() - %(message)s'
    datefmt: '%Y-%m-%d %H:%M:%S'

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: default
    stream: ext://sys.stdout
  
  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/app.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8
  
  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/error.log
    maxBytes: 10485760  # 10MB
    backupCount: 5
    encoding: utf8
  
  audit_file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: json
    filename: logs/audit.log
    maxBytes: 10485760  # 10MB
    backupCount: 10
    encoding: utf8

loggers:
  # 应用主日志
  insurance_agent:
    level: INFO
    handlers: [console, file, error_file]
    propagate: false
  
  # Agent日志
  insurance_agent.agents:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  
  # API日志
  insurance_agent.api:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  # 数据库日志
  insurance_agent.database:
    level: INFO
    handlers: [file]
    propagate: false
  
  # 审计日志（合规检查、敏感操作）
  insurance_agent.audit:
    level: INFO
    handlers: [audit_file]
    propagate: false
  
  # 性能监控日志
  insurance_agent.performance:
    level: INFO
    handlers: [file]
    propagate: false
  
  # 质量监控日志
  insurance_agent.quality:
    level: INFO
    handlers: [file]
    propagate: false
  
  # LangGraph日志
  langgraph:
    level: WARNING
    handlers: [console, file]
    propagate: false
  
  # LangChain日志
  langchain:
    level: WARNING
    handlers: [console, file]
    propagate: false
  
  # FastAPI日志
  uvicorn:
    level: INFO
    handlers: [console, file]
    propagate: false
  
  uvicorn.access:
    level: INFO
    handlers: [file]
    propagate: false
  
  # SQLAlchemy日志
  sqlalchemy.engine:
    level: WARNING
    handlers: [file]
    propagate: false
  
  # Redis日志
  redis:
    level: WARNING
    handlers: [file]
    propagate: false

root:
  level: INFO
  handlers: [console, file, error_file]
